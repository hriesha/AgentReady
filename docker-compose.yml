services:
  api:
    build: ./api
    ports:
      - "8000:8000"
    environment:
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_BASE_URL=${LLM_BASE_URL:-}
      - LLM_MODEL=${LLM_MODEL:-}
      - LLM_MAX_RPM=${LLM_MAX_RPM:-12}
      - DATABASE_URL=${DATABASE_URL:-sqlite:///./agentready.db}
      - WEB_ORIGIN=${WEB_ORIGIN:-http://localhost:5173}
      - DEMO_MODE=${DEMO_MODE:-false}

  web:
    build:
      context: ./web
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    ports:
      - "5173:80"
    depends_on:
      - api
